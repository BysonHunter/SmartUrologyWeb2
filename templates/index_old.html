<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка и обработка КТ </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Загрузить ZIP-архив с DICOM серией</h1>
        <form method="post" enctype="multipart/form-data" action="/">
            <input type="file" name="file" accept=".zip" required>
            <button type="submit">Загрузить и обработать</button>
        </form>

        {% if message %}
            <div class="message success">{{ message }}</div>
        {% endif %}

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        {% if pdf_path %}
            <h2>Сформированный PDF с отчетом:</h2>
            <iframe src="{{ pdf_path }}" width="800" height="600" frameborder="0"></iframe>
        {% endif %}
    </div>
</body>
</html>
