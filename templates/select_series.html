<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма выбора</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Форма выбора</h1>
    <form method="POST" action="/continue_with_series">
        <!-- Скрытые поля для строковых параметров -->
        <input type="hidden" name="param1" value="{{ param1 }}">
        <input type="hidden" name="param2" value="{{ param2 }}">
        <input type="hidden" name="param3" value="{{ param3 }}">
        
        <div class="form-group">
            <label>Параметр 1:</label>
            <input type="text" value="{{ param1 }}" disabled>
        </div>
        
        <div class="form-group">
            <label>Параметр 2:</label>
            <input type="text" value="{{ param2 }}" disabled>
        </div>
        
        <div class="form-group">
            <label>Параметр 3:</label>
            <input type="text" value="{{ param3 }}" disabled>
        </div>
        
        <div class="form-group">
            <label for="param4">Выберите вариант:</label>
            <select id="param4" name="param4" required>
                <option value="">-- Выберите вариант --</option>
                {% for variant in param4Variants %}
                    <option value="{{ variant }}">{{ variant }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit">Продолжить</button>
    </form>
</body>
</html>
