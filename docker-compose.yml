
services:
  dicom-processor:
    build: .
    container_name: dicom_processor
    ports:
      - "5000:5000"
    volumes:
      #- ./in:/app/in
      #- ./out:/app/out
      - ./workdir:/app/workdir
      - ./detectObj/weights:/app/detectObj/weights
      #- ./data:/app/data

    environment:
      - FLASK_APP=main_frontend.py
      - FLASK_ENV=development
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Для GPU поддержки (раскомментировать если нужно):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis для сессий (опционально)
  # redis:
  #   image: redis:alpine
  #   container_name: redis_cache
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

volumes:
  # redis_data:
  in_data:
  out_data:
  workdir_data: